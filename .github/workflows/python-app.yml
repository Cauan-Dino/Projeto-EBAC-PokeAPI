name: Fastapi - Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  fastapi-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Copiar todo Código do Repositório
        uses: actions/checkout@v4

      - name: Instalar poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configurar Python e cache do Poetry
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: poetry

      - name: Baixar Dependências com o Poetry
        working-directory: ./pokeapi
        run: poetry install --no-interaction --no-root

      - name: Executar teste
        working-directory: ./pokeapi
        env:
          PYTHONPATH: ${{ github.workspace }}/pokeapi/src
        run: poetry run pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: fastapi-tests

    steps:
      - name: Copiar o Repositório pro Container
        uses: actions/checkout@v4

      - name: Criar .env temporário
        run: |
          echo "REDIS_PORT=6379" > .env
          echo "ES_PORT=9200" >> .env
          echo "KIBANA_PORT=5601" >> .env
    
      - name: Buildar e Subir Container
        run: |
          docker compose up -d --build app
          sleep 10
          docker compose logs app

      - name: Verificar se o Container ainda está de Pé
        run: docker compose ps | grep Up

      - name: Fazer Requisição na API
        run: curl --fail http://localhost:8000/docs || exit 1

      - name: Listar logs Se FALHAR
        if: failure()
        run: docker compose logs
      
      - name: Limpar o Container
        if: always()
        run: docker compose down    
